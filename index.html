<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
  <article>
      <img class="hero-image" alt="" src="./assets/images/illustration-article.svg" />
      <div class="card-content">
        <span class="tag">Learning</span>
        <time datetime="2023-12-21"> Published 21 Dec 2023</time>
        <h1><a href="#">HTML & CSS foundations</a></h1>
        <p class="preview-text">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="author-row">
        <img alt="Greg Hooper" class="avatar" src="./assets/images/image-avatar.webp" />
        <p>Greg Hooper</p>
      </div>
    </article>
  </main>
  <footer>
    <small>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</small></a>. 
    <small>Coded by <a href="https://github.com/joKC-tech">Jo</a>.</small>
  </footer>
</body>
</html>
